<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asa! — Comic</title>
  <style>
    :root {
      --bg: #020202;
      --text: #5ef2ff;
      --muted: #7aa9b0;
      --accent: #2fd3e0;
      --accent2: #1a6e78;
      --line: #17353a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow-x: hidden;
    }

    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ─────────────────────────────────────────────
       화살표 버튼 — 사이드바와 완전히 분리된 고정 요소
       position: fixed 로 화면 왼쪽 상단에 항상 고정
       어떤 div 안에도 속하지 않음
    ───────────────────────────────────────────── */
    .arrow-fixed {
      position: fixed;
      top: 24px;
      left: 24px;
      display: flex;
      gap: 6px;
      z-index: 100;
    }

    .arrow-btn {
      border: 1px solid var(--line);
      background: rgba(5,5,5,0.92); /* 반투명 배경으로 뒤 텍스트 안 비침 */
      color: var(--text);
      padding: 8px 16px;
      cursor: pointer;
      font-size: 1rem;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      backdrop-filter: blur(4px); /* 뒤 배경 흐리게 */
    }
    .arrow-btn:hover {
      border-color: var(--accent);
      background: rgba(47,211,224,0.12);
      box-shadow: 0 0 10px rgba(47,211,224,0.25);
    }

    /* ─────────────────────────────────────────────
       전체 레이아웃
       화살표가 fixed라서 왼쪽 여백 확보
    ───────────────────────────────────────────── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      /* 상단: 화살표 버튼 공간 확보 */
      padding: 72px 24px 80px;
    }

    /* 상단 바 — 화살표 버튼 아래에 위치 */
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }
    .top h1 {
      font-size: 1.8rem;
      letter-spacing: 0.06em;
      background: linear-gradient(90deg, #5ef2ff, #2fd3e0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .top a {
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--line);
      padding: 8px 14px;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      transition: border-color 0.2s, color 0.2s;
    }
    .top a:hover { border-color: var(--accent); color: #fff; }

    /* ─────────────────────────────────────────────
       메인 레이아웃: 사이드바(에피소드 목록) + 뷰어
       화살표는 이 레이아웃 밖 (fixed)
    ───────────────────────────────────────────── */
    .comic-layout {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* 사이드바 — 에피소드 버튼만 있음, sticky 없음 */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-label {
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
      padding: 4px 0;
    }

    /* 에피소드 버튼 */
    .chapter-btn {
      border: 1px solid var(--line);
      background: rgba(94,242,255,0.04);
      color: var(--text);
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      font-size: 0.9rem;
      width: 100%;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .chapter-btn:hover {
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 10px rgba(47,211,224,0.2);
      transform: translateY(-1px);
    }
    .chapter-btn.active {
      border-color: var(--accent);
      background: rgba(47,211,224,0.12);
    }

    /* ─────────────────────────────────────────────
       뷰어 — 웹툰 이미지가 페이지처럼 길게 펼쳐짐
    ───────────────────────────────────────────── */
    .viewer {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .viewer-title {
      color: #bdfcff;
      font-size: 1rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    /* 웹툰 이미지 스트립 — 박스 없이 페이지 전체에 */
    .webtoon-strip {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .webtoon-strip img {
      width: 100%;
      height: auto;
      display: block;
      /* 화면 밖 이미지는 렌더링 건너뜀 — 긴 웹툰 페이지 성능 최적화 */
      content-visibility: auto;
      /* 이미지 렌더링 품질 최적화 */
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    .viewer-placeholder {
      width: 100%;
      min-height: 400px;
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
    }

    .copy {
      color: var(--muted);
      font-size: 0.78rem;
      text-align: center;
      padding: 20px 0 10px;
      border-top: 1px solid var(--line);
      margin-top: 8px;
      letter-spacing: 0.08em;
    }

    /* 스크롤 진행도 바 */
    #progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      width: 0%;
      background: linear-gradient(90deg, #0a4a50, #2fd3e0, #7ff7ff);
      z-index: 9999;
      box-shadow: 0 0 8px rgba(47,211,224,0.7);
      transition: width 0.1s linear;
      pointer-events: none;
    }

    /* 커스텀 커서 */
    * { cursor: none !important; }
    #cursor-dot {
      position: fixed;
      width: 7px; height: 7px;
      background: #2fd3e0;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 8px #2fd3e0, 0 0 18px rgba(47,211,224,0.4);
    }
    #cursor-ring {
      position: fixed;
      width: 28px; height: 28px;
      border: 1px solid rgba(47,211,224,0.55);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, border-color 0.2s;
    }
  </style>
  <script src="../comics.js"></script>
</head>
<body>
<div id="progress-bar"></div>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

  <canvas id="particles"></canvas>

  <!-- ★ 화살표 버튼 — 사이드바와 완전히 분리, 화면에 fixed 고정 -->
  <div class="arrow-fixed">
    <button class="arrow-btn" id="prevBtn" title="이전 에피소드">◀</button>
    <button class="arrow-btn" id="nextBtn" title="다음 에피소드">▶</button>
  </div>

  <div class="container">
    <div class="top">
      <h1>Asa!</h1>
      <a href="../index.html">← Back to Home</a>
    </div>

    <div class="comic-layout">

      <!-- 사이드바: 에피소드 목록만 있음 -->
      <div class="sidebar">
        <div class="nav-label">Episodes</div>

        <!-- ★ 에피소드는 comics.js 에서 관리 — 여기는 자동 생성됨 -->
        <div id="episodeList"><!-- JS가 채움 --></div>

      </div>

      <!-- 뷰어 -->
      <div class="viewer">
        <div class="viewer-title" id="viewerTitle">Episode 1 — Intro</div>
        <div class="webtoon-strip" id="webtoonStrip"></div>
        <div class="copy">Copyright © Lawren103 | Commercial Use Prohibited.</div>
      </div>

    </div>
  </div>

  <script>
    /* 파티클 */
    (function() {
      var canvas = document.getElementById('particles');
      var ctx = canvas.getContext('2d');
      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', resize);
      var dots = Array.from({ length: 60 }, function() {
        return { x: Math.random()*2000, y: Math.random()*1200,
                 r: Math.random()*1.4+0.3, dx: (Math.random()-.5)*.25,
                 dy: (Math.random()-.5)*.25, a: Math.random()*.5+.1 };
      });
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        dots.forEach(function(d) {
          ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(94,242,255,' + d.a + ')'; ctx.fill();
          d.x += d.dx; d.y += d.dy;
          if (d.x < 0) d.x = canvas.width;  if (d.x > canvas.width)  d.x = 0;
          if (d.y < 0) d.y = canvas.height; if (d.y > canvas.height) d.y = 0;
        });
        requestAnimationFrame(draw);
      }
      draw();
    })();

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       에피소드 전환
       화살표(fixed) + 에피소드 버튼(사이드바) 모두 여기서 처리
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    // EPISODES(comics.js)로 사이드바 동적 생성
    var listEl = document.getElementById('episodeList');
    if (typeof EPISODES !== 'undefined' && listEl) {
      EPISODES.forEach(function(ep, i) {
        var btn = document.createElement('button');
        btn.className = 'chapter-btn' + (i === 0 ? ' active' : '');
        btn.dataset.title  = ep.title;
        btn.dataset.images = JSON.stringify(ep.images);
        btn.textContent    = ep.label;
        listEl.appendChild(btn);
      });
    }
    var episodeButtons = Array.from(document.querySelectorAll('.chapter-btn'));
    var viewerTitleEl  = document.getElementById('viewerTitle');
    var webtoonStripEl = document.getElementById('webtoonStrip');
    var prevBtn        = document.getElementById('prevBtn');
    var nextBtn        = document.getElementById('nextBtn');
    var currentIndex   = 0;

    function showEpisode(index) {
      currentIndex = (index + episodeButtons.length) % episodeButtons.length;

      episodeButtons.forEach(function(btn, i) {
        btn.classList.toggle('active', i === currentIndex);
      });

      var activeBtn = episodeButtons[currentIndex];
      viewerTitleEl.textContent = activeBtn.dataset.title;

      var imageList = [];
      try { imageList = JSON.parse(activeBtn.dataset.images || '[]'); } catch(e) {}

      if (imageList.length > 0) {
        webtoonStripEl.innerHTML = imageList.map(function(src) {
          return '<img src="' + src + '" alt="' + activeBtn.dataset.title + '" loading="lazy" />';
        }).join('');
      } else {
        webtoonStripEl.innerHTML = '<div class="viewer-placeholder">Coming soon...</div>';
      }

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    episodeButtons.forEach(function(btn, i) {
      btn.addEventListener('click', function() { showEpisode(i); });
    });
    prevBtn.addEventListener('click', function() { showEpisode(currentIndex - 1); });
    nextBtn.addEventListener('click', function() { showEpisode(currentIndex + 1); });

    showEpisode(0);
  
  // 스크롤 진행도 바
  (function() {
    var bar = document.getElementById('progress-bar');
    var viewer = document.getElementById('episodeViewer') || document.querySelector('.episode-viewer') || document.documentElement;
    function updateBar() {
      var el = document.querySelector('.episode-viewer') || document.documentElement;
      var scrollTop = el.scrollTop || window.scrollY;
      var scrollH   = el.scrollHeight - el.clientHeight;
      var pct = scrollH > 0 ? (scrollTop / scrollH) * 100 : 0;
      bar.style.width = pct + '%';
    }
    var viewer2 = document.querySelector('.episode-viewer');
    if (viewer2) viewer2.addEventListener('scroll', updateBar);
    window.addEventListener('scroll', updateBar);
  })();

  // 커스텀 커서
  (function() {
    var dot = document.getElementById('cursor-dot');
    var ring = document.getElementById('cursor-ring');
    var mx = window.innerWidth/2, my = window.innerHeight/2, rx = mx, ry = my;
    var trails = [];
    for (var i = 0; i < 8; i++) {
      var t = document.createElement('div');
      t.style.cssText = 'position:fixed;border-radius:50%;pointer-events:none;z-index:9996;transform:translate(-50%,-50%);';
      document.body.appendChild(t);
      trails.push({ el: t, x: mx, y: my });
    }
    document.addEventListener('mousemove', function(e) {
      mx = e.clientX; my = e.clientY;
      dot.style.left = mx + 'px'; dot.style.top = my + 'px';
    });
    document.addEventListener('mouseover', function(e) {
      if (e.target.matches('a,button,.chapter-btn,.nav-arrow')) {
        ring.style.width = '44px'; ring.style.height = '44px';
        ring.style.borderColor = 'rgba(47,211,224,0.9)';
      }
    });
    document.addEventListener('mouseout', function(e) {
      if (e.target.matches('a,button,.chapter-btn,.nav-arrow')) {
        ring.style.width = '28px'; ring.style.height = '28px';
        ring.style.borderColor = 'rgba(47,211,224,0.55)';
      }
    });
    function anim() {
      rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      var px = mx, py = my;
      trails.forEach(function(tr, i) {
        tr.x += (px - tr.x) * (0.25 - i * 0.02);
        tr.y += (py - tr.y) * (0.25 - i * 0.02);
        var size = Math.max(1, 4 - i * 0.4);
        var alpha = Math.max(0, 0.22 - i * 0.025);
        tr.el.style.left = tr.x + 'px'; tr.el.style.top = tr.y + 'px';
        tr.el.style.width = size + 'px'; tr.el.style.height = size + 'px';
        tr.el.style.background = 'rgba(47,211,224,' + alpha + ')';
        px = tr.x; py = tr.y;
      });
      requestAnimationFrame(anim);
    }
    anim();
  })();
</script>
</body>
</html>
