<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asa! — Comic</title>
  <link rel="icon" type="image/png" href="../img/favicon.png" />
  <style>
    :root {
      --bg: #020202;
      --text: #5ef2ff;
      --muted: #7aa9b0;
      --accent: #2fd3e0;
      --accent2: #1a6e78;
      --line: #17353a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow-x: hidden;
    }
    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    /* ── 커서 ── */
    * { cursor: none !important; }
    #cursor-dot {
      position: fixed; width: 7px; height: 7px;
      background: #2fd3e0; border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
      box-shadow: 0 0 8px #2fd3e0, 0 0 18px rgba(47,211,224,0.4);
    }
    #cursor-ring {
      position: fixed; width: 28px; height: 28px;
      border: 1px solid rgba(47,211,224,0.55); border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%,-50%);
      transition: width 0.2s, height 0.2s, border-color 0.2s, opacity 0.4s;
    }

    /* ── 진행도 바 ── */
    #progress-bar {
      position: fixed; top: 0; left: 0; height: 3px; width: 0%;
      background: linear-gradient(90deg,#0a4a50,#2fd3e0,#7ff7ff);
      z-index: 9999; box-shadow: 0 0 8px rgba(47,211,224,0.7);
      transition: width 0.1s linear; pointer-events: none;
    }

    /* ── fixed 화살표 ── */
    /* ── 상단 고정 버튼 바 (◀ ▶ + 토글) ── */
    .arrow-fixed {
      position: fixed; top: 24px; left: 24px;
      display: flex; gap: 0; z-index: 200;
    }
    .arrow-btn, #sidebarToggle {
      border: 1px solid var(--line);
      background: rgba(5,5,5,0.92);
      color: var(--text); padding: 8px 14px;
      cursor: pointer; font-size: 0.92rem;
      transition: border-color 0.2s, background 0.2s, color 0.2s, box-shadow 0.2s;
      backdrop-filter: blur(4px);
      margin-right: -1px; /* 버튼 사이 테두리 겹침 제거 */
    }
    #sidebarToggle {
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
    }
    .arrow-btn:hover, #sidebarToggle:hover {
      border-color: var(--accent);
      background: rgba(47,211,224,0.10);
      box-shadow: 0 0 8px rgba(47,211,224,0.2);
      color: #fff; z-index: 1; position: relative;
    }

    /* ── 컨테이너 ── */
    .container {
      position: relative; z-index: 1;
      max-width: 1200px; margin: 0 auto;
      padding: 72px 24px 80px;
    }
    .top {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 22px;
    }
    .top h1 {
      font-size: 1.8rem; letter-spacing: 0.06em;
      background: linear-gradient(90deg,#5ef2ff,#2fd3e0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .top a {
      color: var(--muted); text-decoration: none;
      border: 1px solid var(--line); padding: 8px 14px;
      font-size: 0.85rem; letter-spacing: 0.1em;
      transition: border-color 0.2s, color 0.2s;
    }
    .top a:hover { border-color: var(--accent); color: #fff; }

    /* ── 메인 레이아웃 ── */
    .comic-layout {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 20px; align-items: start;
      transition: grid-template-columns 0.3s ease;
    }
    .comic-layout.sidebar-hidden {
      grid-template-columns: 0px 1fr;
    }

    /* ── 사이드바 ── */
    .sidebar {
      display: flex; flex-direction: column; gap: 8px;
      overflow: hidden;
      transition: opacity 0.3s ease;
    }
    .comic-layout.sidebar-hidden .sidebar {
      opacity: 0; pointer-events: none;
    }
    .nav-label {
      color: var(--muted); font-size: 0.82rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      text-align: center; padding: 4px 0;
      white-space: nowrap;
    }
    .chapter-btn {
      border: 1px solid var(--line);
      background: rgba(94,242,255,0.04);
      color: var(--text); padding: 10px 12px;
      text-align: left; cursor: pointer;
      font-size: 0.9rem; width: 100%;
      white-space: nowrap;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .chapter-btn:hover {
      border-color: var(--accent); color: #fff;
      box-shadow: 0 0 10px rgba(47,211,224,0.2);
      transform: translateY(-1px);
    }
    .chapter-btn.active {
      border-color: var(--accent);
      background: rgba(47,211,224,0.12);
    }

    /* ── 뷰어 ── */
    .viewer { display: flex; flex-direction: column; gap: 12px; }
    .viewer-title {
      color: #bdfcff; font-size: 1rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      border-bottom: 1px solid var(--line); padding-bottom: 10px;
    }
    .webtoon-strip {
      width: 100%; max-width: 700px;
      margin: 0 auto; display: flex; flex-direction: column; gap: 0;
    }
    .webtoon-strip img {
      width: 100%; height: auto; display: block;
      content-visibility: auto;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }
    .viewer-placeholder {
      width: 100%; min-height: 400px;
      border: 1px solid var(--line);
      display: flex; align-items: center;
      justify-content: center; color: var(--muted);
      font-size: 0.9rem; letter-spacing: 0.1em;
    }
    .copy {
      color: var(--muted); font-size: 0.78rem;
      text-align: center; padding: 20px 0 10px;
      border-top: 1px solid var(--line); margin-top: 8px;
      letter-spacing: 0.08em;
    }

    /* ── 모바일 반응형 ── */
    @media (max-width: 640px) {
      .arrow-fixed { top: 14px; left: 14px; }
      .container { padding: 60px 12px 60px; }
      .comic-layout { grid-template-columns: 0px 1fr !important; }
      .sidebar { opacity: 0 !important; pointer-events: none !important; }
      /* 모바일에선 사이드바 오버레이로 펼침 */
      .comic-layout.mobile-open { grid-template-columns: 160px 1fr !important; }
      .comic-layout.mobile-open .sidebar { opacity: 1 !important; pointer-events: auto !important; }
    }
  </style>
  <script src="../comics.js"></script>
</head>
<body>
<div id="progress-bar"></div>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>
<canvas id="particles"></canvas>

<div class="arrow-fixed">
  <button class="arrow-btn" id="prevBtn">◀</button>
  <button class="arrow-btn" id="nextBtn">▶</button>
  <button id="sidebarToggle" title="사이드바 열기/닫기">☰ EP</button>
</div>

<div class="container">
  <div class="top">
    <h1>Asa!</h1>
    <a href="../index.html">← Home</a>
  </div>
  <div class="comic-layout" id="comicLayout">
    <div class="sidebar">
      <div class="nav-label">Episodes</div>
      <div id="episodeList"></div>
    </div>
    <div class="viewer">
      <div class="viewer-title" id="viewerTitle">Episode 1 — Intro</div>
      <div class="webtoon-strip" id="webtoonStrip"></div>
      <div class="copy">Copyright © Lawren103 | Commercial Use Prohibited.</div>
    </div>
  </div>
</div>

<script>
/* ── 파티클 ── */
(function(){
  var c=document.getElementById('particles'),ctx=c.getContext('2d');
  function r(){c.width=window.innerWidth;c.height=window.innerHeight;}r();
  window.addEventListener('resize',r);
  var dots=Array.from({length:60},function(){return{x:Math.random()*2000,y:Math.random()*1200,r:Math.random()*1.4+.3,dx:(Math.random()-.5)*.25,dy:(Math.random()-.5)*.25,a:Math.random()*.5+.1};});
  function draw(){ctx.clearRect(0,0,c.width,c.height);dots.forEach(function(d){ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fillStyle='rgba(94,242,255,'+d.a+')';ctx.fill();d.x+=d.dx;d.y+=d.dy;if(d.x<0)d.x=c.width;if(d.x>c.width)d.x=0;if(d.y<0)d.y=c.height;if(d.y>c.height)d.y=0;});requestAnimationFrame(draw);}
  draw();
})();

/* ── 커서 ── */
(function(){
  var dot=document.getElementById('cursor-dot');
  var ring=document.getElementById('cursor-ring');
  var mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',function(e){
    mx=e.clientX; my=e.clientY;
    dot.style.left=mx+'px'; dot.style.top=my+'px';
    if(e.target.matches('a,button,.chapter-btn,.arrow-btn')){
      ring.style.width='44px'; ring.style.height='44px';
      ring.style.borderColor='rgba(47,211,224,0.9)';
    } else {
      ring.style.width='28px'; ring.style.height='28px';
      ring.style.borderColor='rgba(47,211,224,0.55)';
    }
  });
  (function moveRing(){
    rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12;
    ring.style.left=rx+'px'; ring.style.top=ry+'px';
    requestAnimationFrame(moveRing);
  })();
})();

/* ── 스크롤 진행도 ── */
window.addEventListener('scroll',function(){
  var s=document.documentElement,b=document.body;
  var pct=(s.scrollTop||b.scrollTop)/(s.scrollHeight-s.clientHeight)*100;
  document.getElementById('progress-bar').style.width=pct+'%';
});

/* ── 사이드바 토글 ── */
var layout=document.getElementById('comicLayout');
var toggleBtn=document.getElementById('sidebarToggle');
var sidebarOpen = window.innerWidth > 640; // 데스크탑이면 기본 열림
if(!sidebarOpen) layout.classList.add('sidebar-hidden');

toggleBtn.addEventListener('click',function(){
  var isMobile = window.innerWidth <= 640;
  if(isMobile){
    layout.classList.toggle('mobile-open');
  } else {
    sidebarOpen = !sidebarOpen;
    layout.classList.toggle('sidebar-hidden', !sidebarOpen);
  }
});

/* ── 에피소드 전환 ── */
var listEl=document.getElementById('episodeList');
if(typeof EPISODES!=='undefined'&&listEl){
  EPISODES.forEach(function(ep,i){
    var btn=document.createElement('button');
    btn.className='chapter-btn'+(i===0?' active':'');
    btn.dataset.title=ep.title;
    btn.dataset.images=JSON.stringify(ep.images);
    btn.textContent=ep.label;
    listEl.appendChild(btn);
  });
}
var episodeButtons=Array.from(document.querySelectorAll('.chapter-btn'));
var viewerTitleEl=document.getElementById('viewerTitle');
var webtoonStripEl=document.getElementById('webtoonStrip');
var currentIndex=0;

function showEpisode(index){
  currentIndex=(index+episodeButtons.length)%episodeButtons.length;
  episodeButtons.forEach(function(btn,i){btn.classList.toggle('active',i===currentIndex);});
  var btn=episodeButtons[currentIndex];
  viewerTitleEl.textContent=btn.dataset.title;
  var imgs=[];
  try{imgs=JSON.parse(btn.dataset.images||'[]');}catch(e){}
  if(imgs.length>0){
    webtoonStripEl.innerHTML=imgs.map(function(src){return '<img src="'+src+'" alt="" loading="lazy"/>';}).join('');
  } else {
    webtoonStripEl.innerHTML='<div class="viewer-placeholder">준비중입니다.</div>';
  }
  window.scrollTo({top:0,behavior:'smooth'});
  // 모바일에선 에피소드 선택 후 사이드바 자동 닫기
  if(window.innerWidth<=640) layout.classList.remove('mobile-open');
}
episodeButtons.forEach(function(btn,i){btn.addEventListener('click',function(){showEpisode(i);});});
document.getElementById('prevBtn').addEventListener('click',function(){showEpisode(currentIndex-1);});
document.getElementById('nextBtn').addEventListener('click',function(){showEpisode(currentIndex+1);});
showEpisode(0);
</script>
</body>
</html>
